<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#1a1a1a" stroke-width="3">
  <!-- ESCUDO WICHI/ANDINO (STENCIL) -->
  <rect x="25" y="20" width="50" height="60" rx="4" fill="#1a1a1a" />
  <!-- Símbolos internos (negativo) -->
  <circle cx="50" cy="50" r="15" stroke="white" stroke-width="4" />
  <path d="M40 50 H60 M50 40 V60" stroke="white" stroke-width="3" />
  <!-- Asperezas de stencil -->
  <circle cx="30" cy="25" r="2" fill="white" />
  <circle cx="70" cy="75" r="2" fill="white" />
</svg>
